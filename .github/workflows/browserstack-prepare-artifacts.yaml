name: Prepare Device Farm Artifacts
on:
  workflow_call:
    secrets:
      SIGNING_KEYSTORE:
        description: 'Needed for signing the apk artifacts'
        required: true
      SIGNING_ALIAS:
        description: 'Needed for signing the apk artifacts'
        required: true
      SIGNING_KEYSTORE_PASSWORD:
        description: 'Needed for signing the apk artifacts'
        required: true
      SIGNING_KEY_PASSWORD:
        description: 'Needed for signing the apk artifacts'
        required: true
      SLACK_WEBHOOK:
        description: Slack Notifier Incoming Webhook
        required: true
      E2E_CONFIG:
        description: 'Variables for the e2e tests'
        required: true
jobs:
  prepare-device-farm-artifacts:
    runs-on: ubuntu-latest

    steps:
      # Clone the repo
      - name: Clone the repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{github.event.pull_request.head.repo.full_name}}

      # Set up the variables for the tests from the secrets
      - name: Setup config file for e2e tests
        run: |
          echo "${{ secrets.E2E_CONFIG }}" > journey/src/main/assets/test_config.properties

      # Setup JDK and cache and restore dependencies.
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # Build apk files
      - name: Prepare device farm artifacts
        run: |
          ./gradlew assembleDebug assembleDebugAndroidTest \
            --stacktrace \
            --build-cache \
            --parallel

      # List the available build tools versions see https://github.com/r0adkll/sign-android-release/issues/84
      - name: List build tools versions
        run: ls $ANDROID_HOME/build-tools/

      # Sign app-debug.apk
      - name: Sign app-debug.apk
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: samples/app/build/outputs/apk/debug
          signingKeyBase64: ${{ secrets.SIGNING_KEYSTORE }}
          alias: ${{ secrets.SIGNING_ALIAS }}
          keyStorePassword: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      # Sign davinci-debug-androidTest.apk
      - name: Sign davinci-debug-androidTest.apk
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: davinci/build/outputs/apk/androidTest/debug
          signingKeyBase64: ${{ secrets.SIGNING_KEYSTORE }}
          alias: ${{ secrets.SIGNING_ALIAS }}
          keyStorePassword: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      # Sign journey-debug-androidTest.apk
      - name: Sign journey-debug-androidTest.apk
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: journey/build/outputs/apk/androidTest/debug
          signingKeyBase64: ${{ secrets.SIGNING_KEYSTORE }}
          alias: ${{ secrets.SIGNING_ALIAS }}
          keyStorePassword: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      # Publish the signed APKs as build artifacts
      - name: Publish app-debug.apk
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-debug-signed.apk
          path: samples/app/build/outputs/apk/debug/app-debug-signed.apk

      - name: Publish davinci-debug-androidTest.apk
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: davinci-debug-androidTest-signed.apk
          path: davinci/build/outputs/apk/androidTest/debug/davinci-debug-androidTest-signed.apk

      - name: Publish journey-debug-androidTest.apk
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: journey-debug-androidTest-signed.apk
          path: journey/build/outputs/apk/androidTest/debug/journey-debug-androidTest-signed.apk

      # Send slack notification ONLY if any of the steps above fail
      - name: Send slack notification
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          fields: all
          custom_payload: |
            {
              attachments: [{
                title: ':no_entry: Failed to prepare BrowserStack test artifacts',
                color: 'danger',
                text: `\nWorkflow: ${process.env.AS_WORKFLOW} -> ${process.env.AS_JOB}\nPull request: ${process.env.AS_PULL_REQUEST}\nCommit: ${process.env.AS_COMMIT} by ${process.env.AS_AUTHOR}`, 
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        if: failure()